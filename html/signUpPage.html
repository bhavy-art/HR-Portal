<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/signUpPage.css">
    <title>Sign up page</title>
</head>
<body>
    <main>
        <section class="upperContainer">
            <div>
                <img class="hrlogo" src="../assets/75f57b59b96b8de4576346f046d77b8698a60f5e.png" alt="HR">
                <p class="welcome"><strong>Create your account</strong></p>
                <p class="please">Join the community and get started.</p>
            </div>
            <br>
            <div class="btnConatiner">
                <button class="login">Login</button>
                <button class="sign">Sign Up</button>
            </div>

        </section class="middleContainer">
            <div class="nameInput">
                <p class="name">Full Name</p>
                <input class="nameHolder" type="text" placeholder="nancy">
            </div>

            <div class="outerDiv">
                <div class="emailInput">
                    <p class="email">Email</p>
                    <input class="emailHolder" type="email" placeholder="john@university.edu">
                </div>

                <div class="mobileInput">
                    <p class="mobile">Mobile Number</p>
                    <input class="mobileHolder" type="number" placeholder="+1 (555) 000 000">
                </div>
            </div>

            <div class="outerDiv">
                <div class="emailInput">
                    <p class="email">Password</p>
                    <input class="emailHolder" type="password" placeholder="......">
                </div>

                <div class="mobileInput">
                    <p class="mobile">ConfirmPassword</p>
                    <input class="mobileHolder" type="password" placeholder="......">
                </div>
            </div>

            <div>
                <p class="remember"><input class="check" type="checkbox">I agree to the Term of Service and Privacy Policy</p>
            </div>

            <button class="loginbtn">Create Account</button>

            <div>
                <p class="loginHere">Already have an account? <span class="span"> Login here</span></p>
            </div>
            
        <section>

        </section>
    </main>
</body>
</html>
