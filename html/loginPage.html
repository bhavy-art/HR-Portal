<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/loginPage.css">
    <title>Login Page</title>
</head>
<body>
    <main>
        <section class="upperContainer">
            <div>
                <img class="hrlogo" src="../assets/75f57b59b96b8de4576346f046d77b8698a60f5e.png" alt="HR">
                <p class="welcome"><strong>Welcome Back</strong></p>
                <p class="please">Please select your role and sign in to continue</p>
            </div>
            <br>
            <div class="btnConatiner">
                <button class="login">Login</button>
                <button class="sign">Sign Up</button>
            </div>
        </section>

        <section class="middleContainer">
            <div class="emailInput">
                <p class="email">Email or Mobile Number</p>
                <input class="emailHolder" type="text" placeholder="nancy@123456">
            </div>
            
            <div class="passInput">
                <div class="passConatiner">
                    <span class="pass">Password <span class="changeColor">Forgot Password?</span></span>
                </div>
                
                <div class="passHolder">
                    <input type="password" placeholder="password">
                </div>
            </div>
            
            <br>
            <button class="loginbtn">Login</button>
            <label class="remember"><input class="check" type="checkbox">Remember me for 30 days</label>
        </section>

        <section class="lowerContainer">
            <div class="social">
                 <button class="google"><img class="gooleimg" src="#" alt="">Google</button>
                <button class="facebook"><img class="facebookimg" src="#" alt="">Facebook</button>
            </div>
           
        </section>
    </main>
    
</body>
</html>
